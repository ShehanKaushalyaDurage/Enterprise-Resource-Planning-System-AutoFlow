services:
  postgres:
    image: postgres:16-alpine
    container_name: autoflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: autoflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - autoflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: autoflow_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - autoflow
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: autoflow_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - autoflow

volumes:
  postgres_data:

networks:
  autoflow:
    driver: bridge
